<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VRITTIFY AI Chat</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-dark: #0f172a;
            --bg-panel: rgba(30, 41, 59, 0.7);
            --border-glow: rgba(56, 189, 248, 0.3);
            --primary: #38bdf8;
            --primary-hover: #0ea5e9;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --bubble-user: rgba(56, 189, 248, 0.15);
            --bubble-ai: rgba(51, 65, 85, 0.5);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Inter', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #020617 0%, var(--bg-dark) 100%);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .chat-container {
            width: 100%;
            max-width: 900px;
            height: 90vh;
            background: var(--bg-panel);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5), 0 0 40px var(--border-glow);
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .header {
            padding: 24px 32px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(15, 23, 42, 0.4);
        }

        .header h1 {
            font-size: 1.25rem;
            font-weight: 600;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .status {
            font-size: 0.875rem;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #22c55e;
            border-radius: 50%;
            box-shadow: 0 0 10px #22c55e;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0.4);
            }

            70% {
                box-shadow: 0 0 0 6px rgba(34, 197, 94, 0);
            }

            100% {
                box-shadow: 0 0 0 0 rgba(34, 197, 94, 0);
            }
        }

        .messages {
            flex: 1;
            padding: 32px;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 24px;
            scroll-behavior: smooth;
        }

        .messages::-webkit-scrollbar {
            width: 6px;
        }

        .messages::-webkit-scrollbar-thumb {
            background: rgba(255, 255, 255, 0.1);
            border-radius: 10px;
        }

        .message {
            display: flex;
            gap: 16px;
            max-width: 85%;
            animation: fadeIn 0.4s ease-out forwards;
            opacity: 0;
            transform: translateY(10px);
        }

        .message.user {
            align-self: flex-end;
            flex-direction: row-reverse;
        }

        @keyframes fadeIn {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 10px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.2rem;
            flex-shrink: 0;
        }

        .user .avatar {
            background: linear-gradient(135deg, #3b82f6, #8b5cf6);
        }

        .ai .avatar {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .bubble {
            padding: 16px 20px;
            border-radius: 18px;
            font-size: 0.95rem;
            line-height: 1.6;
            color: rgba(255, 255, 255, 0.9);
        }

        .user .bubble {
            background: var(--bubble-user);
            border: 1px solid rgba(56, 189, 248, 0.2);
            border-bottom-right-radius: 4px;
        }

        .ai .bubble {
            background: var(--bubble-ai);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-bottom-left-radius: 4px;
        }

        .input-area {
            padding: 24px 32px;
            background: rgba(15, 23, 42, 0.5);
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .input-wrapper {
            display: flex;
            gap: 16px;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 8px 16px;
            border-radius: 20px;
            transition: all 0.3s ease;
        }

        .input-wrapper:focus-within {
            border-color: var(--primary);
            box-shadow: 0 0 15px rgba(56, 189, 248, 0.2);
            background: rgba(0, 0, 0, 0.4);
        }

        textarea {
            flex: 1;
            background: transparent;
            border: none;
            color: var(--text-main);
            font-size: 1rem;
            line-height: 1.5;
            resize: none;
            padding: 12px 0;
            outline: none;
            max-height: 120px;
        }

        textarea::placeholder {
            color: var(--text-muted);
        }

        button {
            background: var(--primary);
            color: #0f172a;
            border: none;
            border-radius: 14px;
            width: 48px;
            height: 48px;
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: pointer;
            transition: all 0.2s ease;
            align-self: flex-end;
            margin-bottom: 2px;
        }

        button:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        button:active {
            transform: scale(0.95);
        }

        button svg {
            width: 20px;
            height: 20px;
            fill: currentColor;
            transform: translateX(2px);
        }

        button:disabled {
            background: var(--text-muted);
            cursor: not-allowed;
            transform: none;
        }

        .typing-indicator {
            display: flex;
            gap: 6px;
            padding: 10px 4px;
        }

        .typing-indicator span {
            width: 6px;
            height: 6px;
            background: var(--text-muted);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out both;
        }

        .typing-indicator span:nth-child(1) {
            animation-delay: -0.32s;
        }

        .typing-indicator span:nth-child(2) {
            animation-delay: -0.16s;
        }

        @keyframes bounce {

            0%,
            80%,
            100% {
                transform: scale(0);
            }

            40% {
                transform: scale(1);
            }
        }

        .time-badge {
            font-size: 0.70rem;
            color: var(--text-muted);
            margin-top: 8px;
            text-align: right;
            opacity: 0.6;
        }
    </style>
</head>

<body>

    <div class="chat-container">
        <div class="header">
            <h1>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                    stroke-linecap="round" stroke-linejoin="round">
                    <path
                        d="M12 2a2 2 0 0 1 2 2c-.11.66.08 1.35.53 1.84l1.64 1.76a4.2 4.2 0 0 0 4.14 1.05 2 2 0 0 1 1.69 3.53l-1.32 1.34a4.14 4.14 0 0 0-1.12 4 2 2 0 0 1-2.92 2.3l-1.8-1a4.2 4.2 0 0 0-4.27 0l-1.8 1a2 2 0 0 1-2.92-2.3l-1.12-4a4.14 4.14 0 0 0-1.32-1.34 2 2 0 0 1 1.69-3.53a4.2 4.2 0 0 0 4.14-1.05l1.64-1.76A2 2 0 0 1 12 2Z">
                    </path>
                    <path d="M9 12h6"></path>
                    <path d="M12 9v6"></path>
                </svg>
                VRITTIFY AI Private LLM
            </h1>
            <div class="status">
                <div class="status-dot"></div>
                Securely Connected
            </div>
        </div>

        <div class="messages" id="messages-box">
            <!-- Welcome Message -->
            <div class="message ai">
                <div class="avatar">🤖</div>
                <div class="bubble">
                    Hello! I'm your team's privately hosted AI model. I am running locally right now so nothing
                    you say here is sent to the cloud. How can I help you today?
                </div>
            </div>
        </div>

        <div class="input-area">
            <div class="input-wrapper">
                <textarea id="user-input" rows="1" placeholder="Type your message here..." oninput="autoResize(this)"
                    onkeydown="checkEnter(event)"></textarea>
                <button id="send-btn" onclick="sendMessage()">
                    <svg viewBox="0 0 24 24">
                        <path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path>
                    </svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const inputField = document.getElementById("user-input");
        const messagesBox = document.getElementById("messages-box");
        const sendBtn = document.getElementById("send-btn");

        // Keep track of the conversation context
        let conversationHistory = [
            { "role": "system", "content": "You are a helpful and concise AI assistant hosted privately by this team. Always provide clear, beautifully formatted answers." }
        ];

        function autoResize(el) {
            el.style.height = "auto";
            el.style.height = (el.scrollHeight < 120 ? el.scrollHeight : 120) + "px";
        }

        function checkEnter(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }

        function appendMessage(role, text, timeMs = null) {
            const wrapper = document.createElement("div");
            wrapper.className = `message ${role}`;

            const avatar = document.createElement("div");
            avatar.className = "avatar";
            avatar.innerText = role === "user" ? "🧑‍💻" : "🤖";

            const bubbleWrap = document.createElement("div");

            const bubble = document.createElement("div");
            bubble.className = "bubble";
            // Very simple markdown formatting processing (newlines to br)
            bubble.innerHTML = text.replace(/\n/g, "<br>");
            bubbleWrap.appendChild(bubble);

            if (timeMs) {
                const badge = document.createElement("div");
                badge.className = "time-badge";
                badge.innerText = `Generated in ${(timeMs / 1000).toFixed(1)}s`;
                bubbleWrap.appendChild(badge);
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubbleWrap);
            messagesBox.appendChild(wrapper);
            messagesBox.scrollTop = messagesBox.scrollHeight;
        }

        function setTypingIndicator(show) {
            if (show) {
                const wrapper = document.createElement("div");
                wrapper.className = `message ai`;
                wrapper.id = "typing-msg";
                wrapper.innerHTML = `
                    <div class="avatar">🤖</div>
                    <div class="bubble">
                        <div class="typing-indicator">
                            <span></span><span></span><span></span>
                        </div>
                    </div>`;
                messagesBox.appendChild(wrapper);
                messagesBox.scrollTop = messagesBox.scrollHeight;
                sendBtn.disabled = true;
            } else {
                const typingObj = document.getElementById("typing-msg");
                if (typingObj) typingObj.remove();
                sendBtn.disabled = false;
            }
        }

        async function sendMessage() {
            const text = inputField.value.trim();
            if (!text) return;

            // Clear input
            inputField.value = "";
            inputField.style.height = "auto";

            // Append User message
            appendMessage("user", text);
            conversationHistory.push({ "role": "user", "content": text });

            // Show typing
            setTypingIndicator(true);

            try {
                const response = await fetch("/chat", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        "messages": conversationHistory,
                        "max_tokens": 512,
                        "temperature": 0.7
                    })
                });

                if (!response.ok) {
                    throw new Error("Server disconnected or timeout");
                }

                const data = await response.json();
                const aiReply = data.message.content;
                const timeMs = data.response_time_ms;

                conversationHistory.push({ "role": "assistant", "content": aiReply });

                setTypingIndicator(false);
                appendMessage("ai", aiReply, timeMs);

            } catch (err) {
                setTypingIndicator(false);
                appendMessage("ai", "⚠️ Connection error. Please make sure the local server is running.");
            }
        }
    </script>
</body>

</html>
